{% extends "base.html" %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <a href="/" class="btn btn-light mb-3">← Kembali ke Beranda</a>
            
            <div class="card card-pro p-0 overflow-hidden shadow-sm">
                <img src="{{ article.image }}" class="w-100" style="height: 400px; object-fit: cover;">
                <div class="p-5">
                    <span class="badge bg-primary mb-3">{{ article.category }}</span>
                    <h1 class="fw-bold mb-4" style="color: #333;">{{ article.title }}</h1>
                    <div class="article-content" style="line-height: 1.8; font-size: 1.1rem; color: #555;">
                        {{ article.content | safe }}
                    </div>
                </div>
            </div>
            
            <br><br>
        </div>
    </div>
</div>
{% endblock %}
