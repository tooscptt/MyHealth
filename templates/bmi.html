{% extends "base.html" %}

{% block content %}
<div class="container">
    <h2 class="fw-bold mb-4">Kalkulator BMI (Body Mass Index)</h2>
    
    <div class="row">
        <div class="col-md-6">
            <div class="card card-pro p-4">
                <form method="POST">
                    <div class="mb-3">
                        <label>Berat Badan (kg)</label>
                        <input type="number" name="bb" class="form-control" required step="0.1">
                    </div>
                    <div class="mb-3">
                        <label>Tinggi Badan (cm)</label>
                        <input type="number" name="tb" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary w-100">Hitung BMI</button>
                </form>
            </div>
        </div>

        <div class="col-md-6">
            {% if hasil %}
            <div class="card card-pro p-4 bg-light text-center">
                <h3>Skor BMI Anda:</h3>
                <h1 class="display-1 fw-bold text-primary">{{ hasil }}</h1>
                <h4 class="badge bg-dark fs-5">{{ kategori }}</h4>
                <p class="mt-3 text-muted">
                    <small>*BMI 18.5 - 24.9 adalah Normal.</small>
                </p>
            </div>
            {% else %}
            <div class="alert alert-info">
                Masukkan berat dan tinggi badan untuk melihat hasil.
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
